<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verified | Food Computing Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/styling.css') }}">
</head>
<body>

<nav>
    <a href="/" class="nav-logo">
        <div class="nav-logo-circle">
            <img src="{{ url_for('static', filename='assets/food_computing_logo.jpg') }}" alt="Food Computing Academy logo">
        </div> Food Computing Academy
    </a>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
    </ul>
</nav>
{% include 'popups.html' %}

<div class="form-container">
    {% if success %}
        <h2>Your email is verified</h2>
        <p style="color:var(--muted);">{{ message }}</p>
        <a href="/login" class="btn-submit" style="margin-top:1.5rem; display:inline-block;">
            Sign In
        </a>
    {% else %}
        <h2>Couldnt verify email</h2>
        <p style="color:var(--muted);">{{ message }}</p>
        <a href="/create_account" class="btn-submit" style="margin-top:1.5rem; display:inline-block;">
            Try Again
        </a>
    {% endif %}
</div>

{% include 'footer.html' %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password | Food Computing Academy </title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/styling.css') }}">
</head>
<body>

<!-- NAV -->
{% include 'nav.html' %}
{% include 'popups.html' %}

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="search-overlay">
    <div class="search-box">
        <form method="GET" action="/search" style="display:flex; gap:1rem; flex:1;">
            <input type="text" name="q" placeholder="Search..." id="search-input" autocomplete="off">
            <button type="submit" style="background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer;">⏎</button>
        </form>
        <button onclick="closeSearch()">✕</button>
    </div>
</div>
<div class="form-container">
    <h2>Change Password</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form action="/profile/{{session.get('user_id')}}/password" method="POST">
        <div class="form-group">
            <label>Old Password</label>
            <input type="password" name="old_password" required>
            <p class="error">{{messages.old_password}}</p>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required>
            <p class="error">{{messages.new_password}}</p>
        </div>
        <div class="form-group">
            <label>Repeat Password</label>
            <input type="password" name="repeat_password" required>
        </div>
        <button type="submit" class="btn-submit">Change Password</button>
    </form>
</div>
<!-- FOOTER -->
{% include 'footer.html' %}
<script src="{{ url_for('static', filename='js/homepage.js') }}"></script>
</body>
</html>
